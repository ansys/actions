[tox]
description = Automation environments for ansys/actions repository
envlist =
    code-style
    tests
    doc-build
skip_missing_interpreters = true
isolated_build = false

[testenv]
description = Base test environment
basepython = python3
setenv =
    PYTHONUNBUFFERED = yes
passenv =
    PIP_EXTRA_INDEX_URL

[testenv:code-style]
description = Run code style checks via prek
skip_install = true
deps =
    prek
commands =
    prek run --all-files --show-diff-on-failure

[testenv:doc-{clean,links,html}]
description = 
    Environment for 
    html: html documentation generation
    clean: cleaning previously generated html documentation
    links: verifying the integrity of external links within the documentation
skip_install = true
deps =
    links,html: -r{toxinidir}/requirements/requirements_doc.txt
setenv =
    SOURCE_DIR = doc/source
    BUILD_DIR = doc/_build
    BUILDER_OPTS = --color -v -j auto -W --keep-going
    links: BUILDER = linkcheck
    html: BUILDER = html
commands =
    clean: python -c "import shutil, sys; shutil.rmtree(sys.argv[1], ignore_errors=True)" "{toxinidir}/doc/_build"
    html,links: sphinx-build -d "{toxworkdir}/doc_doctree" {env:SOURCE_DIR} "{toxinidir}/{env:BUILD_DIR}/{env:BUILDER}" {env:BUILDER_OPTS} -b {env:BUILDER}

[testenv:update-tag-references]
description = Update CI/CD version references to a new tag (usage: tox -e update-tag-references -- 10.1.2)
skip_install = true
deps =
    click
    tomli
    tomli_w
commands =
    python {toxinidir}/python-utils/update_tag_references.py {posargs}

[testenv:tests]
description = Run Python utility tests
skip_install = true
deps =
    pytest
commands =
    pytest -vv {toxinidir}/python-utils {posargs}
