name: |
  Doc deploy custom path action

description: |
  This action deploys an HTML documentation artifact to a user-specified
  subdirectory on the deployment branch (by default ``gh-pages``) of a
  repository. The documentation will be available at
  ``https://<cname>/<custom-path>/``.

  .. important:: **Required GitHub Permissions**

     - **contents**: ``write`` - Required to push documentation to the gh-pages branch

inputs:

  # Required inputs

  cname:
    description: |
      The canonical name (CNAME) containing the documentation.
    required: true
    type: string

  token:
    description: |
      Required password, key or token with the correct credentials for deploying
      the documentation. If deploying to the current repository, the
      ``secrets.GITHUB_TOKEN`` token is enough. For workflows deploying to other
      repositories, `generate and use a token with write access
      <https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/creating-a-personal-access-token>`_
      to that repository. ``contents: write`` is the minimum permission required
      for this token.
    required: true
    type: string

  bot-user:
    description: |
      Use the PYANSYS_CI_BOT_USERNAME as the user for a git commit & push.
    required: true
    type: string

  bot-email:
    description: |
      Use the PYANSYS_CI_BOT_EMAIL as the email for a git commit & push.
    required: true
    type: string

  custom-path:
    description: |
      The subdirectory on the deployment branch where the documentation will be
      deployed. For example, ``nightly`` or ``feature/my-feature``. The
      documentation will be available at ``https://<cname>/<custom-path>/``.
      This value must not be empty, start with ``/``, contain ``..``, or use
      the reserved paths ``version`` or ``pull``.
    required: true
    type: string

  # Optional inputs

  doc-artifact-name:
    description: |
      Name of the HTML documentation artifact. This artifact is expected to
      contain all the HTML and static files. If it contains a compressed file,
      make sure you enable the ``decompress-artifact`` option.
    required: false
    default: 'documentation-html'
    type: string

  decompress-artifact:
    description: |
      Whether to decompress the ``doc-artifact-name`` file using `ouch
      <https://github.com/ouch-org/ouch>`_ as decompression tool. Default value
      is ``false``.
    required: false
    default: false
    type: string

  repository:
    description: |
      Repository name in the form of ``username/repository`` to be used for
      deploying the documentation. The current repository is assumed by default.
    required: false
    default: 'current'
    type: string

  branch:
    description: |
      Branch name for deploying the documentation. The ``gh-pages`` branch is
      used by default.
    required: false
    default: 'gh-pages'
    type: string

  commit-message:
    description: |
      Commit message used when deploying the documentation.
    required: false
    default: 'DOC: deploy documentation to custom path'
    type: string

runs:
  using: "composite"
  steps:

    - uses: ansys/actions/_logging@main
      with:
        level: "INFO"
        message: >
          Deploying documentation artifact '${{ inputs.doc-artifact-name }}' to
          the '${{ inputs.custom-path }}' subdirectory on the '${{ inputs.branch }}'
          branch of '${{ inputs.repository }}'.

    # ------------------------------------------------------------------------

    - name: "Validate 'custom-path' input"
      shell: bash
      env:
        CUSTOM_PATH: ${{ inputs.custom-path }}
      run: |
        if [[ -z "${CUSTOM_PATH}" || "${CUSTOM_PATH}" == "." ]]; then
          echo "Error: 'custom-path' must not be empty or '.'."
          exit 1
        fi
        if [[ "${CUSTOM_PATH}" == /* ]]; then
          echo "Error: 'custom-path' must not be an absolute path."
          exit 1
        fi
        if [[ "${CUSTOM_PATH}" == *..* ]]; then
          echo "Error: 'custom-path' must not contain '..'."
          exit 1
        fi
        reserved=("version" "pull")
        for r in "${reserved[@]}"; do
          if [[ "${CUSTOM_PATH}" == "${r}" || "${CUSTOM_PATH}" == "${r}/"* ]]; then
            echo "Error: 'custom-path' must not use the reserved path '${r}'."
            exit 1
          fi
        done

    # ------------------------------------------------------------------------

    - uses: ansys/actions/_logging@main
      with:
        level: "INFO"
        message: >
          Checkout the repository branch for deploying the documentation. If
          this step fails, then it means that the provided token is not valid.

    - name: "Get the name of the repository"
      shell: bash
      id: get-repository-name
      env:
        INPUT_REPOSITORY: ${{ inputs.repository }}
      run: |
        if [[ "${INPUT_REPOSITORY}" == "current" ]]; then
          echo "REPOSITORY=${GITHUB_REPOSITORY}" >> ${GITHUB_OUTPUT}
        else
          echo "REPOSITORY=${INPUT_REPOSITORY}" >> ${GITHUB_OUTPUT}
        fi

    - name: "Checkout ${{ steps.get-repository-name.outputs.REPOSITORY }} repository"
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: ${{ steps.get-repository-name.outputs.REPOSITORY }}
        token: ${{ inputs.token }} # zizmor: ignore[artipacked] , credentials must be persisted in this case

    - name: "Ensure that the desired branch exists"
      shell: bash
      env:
        BOT_USER: ${{ inputs.bot-user }}
        BOT_EMAIL: ${{ inputs.bot-email }}
        BRANCH: ${{ inputs.branch }}
      run: | # zizmor: ignore[template-injection] I can't think of any other way to expand input.branch within comments
        # Check the ${{ env.BRANCH }} branch exists on remote
        branch_exists=$(git ls-remote --branches origin "refs/heads/${BRANCH}" 2>&1)

        # If the ${{ env.BRANCH }} doesn't exist, create it as an orphan branch
        if [ -z "$branch_exists" ]; then
          echo "The ${BRANCH} branch does not exist. Creating ${BRANCH}."

          # Create orphan branch
          git checkout --orphan "${BRANCH}"

          # Unstage files to be committed
          git rm --cached -r .

          # Remove untracked files
          git clean -fd

          # Configure git username & email
          git config user.name "${BOT_USER}"
          git config user.email "${BOT_EMAIL}"

          # Commit ${{ env.BRANCH }} & push to origin
          git commit --allow-empty -m "Create ${BRANCH} branch"
          git push -u origin "${BRANCH}"
        else
          # Fetch and switch to ${{ env.BRANCH }}
          git fetch origin "${BRANCH}:${BRANCH}"
          git switch "${BRANCH}"
        fi

    # ------------------------------------------------------------------------

    - uses: ansys/actions/_logging@main
      with:
        level: "INFO"
        message: >
          Download the documentation artifact in '${{ inputs.custom-path }}'.
          Decompress artifact if required. Display the structure of the directory
          to verify that it has the right layout.

    - name: "Clean and prepare the '${{ inputs.custom-path }}' directory"
      shell: bash
      env:
        CUSTOM_PATH: ${{ inputs.custom-path }}
      run: |
        rm -rf "${CUSTOM_PATH}"
        mkdir -p "${CUSTOM_PATH}"

    - name: "Download the documentation artifact"
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.doc-artifact-name }}
        path: ${{ inputs.custom-path }}

    - name: "Update apt-get"
      shell: bash
      run: |
        sudo apt-get update

    - name: "Decompress artifact content"
      shell: bash
      if: inputs.decompress-artifact == 'true'
      env:
        CUSTOM_PATH: ${{ inputs.custom-path }}
      run: |
        sudo apt-get install -y cargo && cargo install ouch --version 0.7.1
        export PATH="$HOME/.cargo/bin/:$PATH"
        ouch --version
        cd "${CUSTOM_PATH}"
        compressed_artifact=$(find . -maxdepth 1 -type f -not -name ".*")
        mkdir _decomp
        ouch decompress "$compressed_artifact" --dir _decomp --yes
        content=(_decomp/*)
        if [ "${#content[@]}" -eq 1 ] && [ -d "${content[0]}" ]; then
          mv "${content[0]}"/* .
        else
          mv _decomp/* .
        fi
        rm -rf "$compressed_artifact" _decomp

    - name: "Display structure of '${{ inputs.custom-path }}'"
      shell: bash
      env:
        CUSTOM_PATH: ${{ inputs.custom-path }}
      run: |
        ls -R "${CUSTOM_PATH}"

    # ------------------------------------------------------------------------

    - uses: ansys/actions/_logging@main
      with:
        level: "INFO"
        message: >
          Generate the "robots.txt" file for guiding web crawlers (spiders)

    - name: "Generate 'robots.txt' file"
      uses: ansys/actions/_doc-gen-robots@main
      with:
        cname: ${{ inputs.cname }}
        custom-path: ${{ inputs.custom-path }}

    # ------------------------------------------------------------------------

    - uses: ansys/actions/_logging@main
      with:
        level: "INFO"
        message: >
          For deploying the documentation, a GitHub token or a deployment token
          is required. The GitHub token is used when deploying to the current
          repository while the deployment token is used to deploy to an external
          repository.

    - name: "Deploy to ${{ inputs.branch }} branch of ${{ github.repository }} repository"
      if: inputs.repository == 'current'
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
      with:
        publish_dir: ${{ inputs.custom-path }}
        destination_dir: ${{ inputs.custom-path }}
        publish_branch: ${{ inputs.branch }}
        github_token: ${{ inputs.token }}
        commit_message: ${{ inputs.commit-message }}
        keep_files: true
        force_orphan: false

    - name: "Deploy to ${{ inputs.branch }} branch of ${{ inputs.repository }}"
      if: inputs.repository != 'current'
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
      with:
        publish_dir: ${{ inputs.custom-path }}
        destination_dir: ${{ inputs.custom-path }}
        publish_branch: ${{ inputs.branch }}
        personal_token: ${{ inputs.token }}
        external_repository: ${{ inputs.repository }}
        commit_message: ${{ inputs.commit-message }}
        keep_files: true
        force_orphan: false
