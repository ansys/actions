# This helps in syncing dependabot updates to pyproject.toml and uv.lock files (located in the
# project root) with the corresponding requirements.txt files.

name: Update requirement.txt files

on:
  push:
    branches:
      - "dependabot/uv/**"

env:
  MAIN_PYTHON_VERSION: '3.14'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  update-requirement-files:
    name: Update requirement.txt files
    permissions:
      contents: write # Needed to update files on the dependabot update branch
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout dependabot branch"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          ref: ${{ github.ref }} # zizmor: ignore[artipacked] , credentials must be persisted in this case

      - name: "Set up Python"
        uses: ansys/actions/_setup-python@main
        with:
            python-version: ${{ env.MAIN_PYTHON_VERSION }}
            use-cache: false
            provision-uv: true
            prune-uv-cache: false

      - name: "Update requirement.txt files"
        run: |
          echo "Directories containing requirements files:"
          echo "=========================================="

          # Process standard requirements.txt files
          find . -maxdepth 2 -type f -name "requirements.txt" -exec dirname {} \; | sort -u | while read dir; do
              # Remove leading ./
              dir_cleaned="${dir#./}"
              # Get the directory name without leading underscore for the group name
              group_name="${dir_cleaned#_}"

              echo "  Processing: $dir_cleaned/requirements.txt (group: $group_name)"

              # Run uv export command
              uv export --format requirements.txt --group "$group_name" --output-file "$dir_cleaned/requirements.txt" --no-hashes
          done

          # Process requirements-<suffix>.txt files (e.g., code-style/requirements-prek.txt)
          find . -maxdepth 2 -type f -name "requirements-*.txt" | sort | while read file; do
              # Remove leading ./
              file_cleaned="${file#./}"
              dir_cleaned="$(dirname "$file_cleaned")"
              # Extract suffix from filename (e.g., "prek" from "requirements-prek.txt")
              basename_file="$(basename "$file_cleaned")"
              suffix="${basename_file#requirements-}"
              suffix="${suffix%.txt}"
              # Group name is dir (without underscore) + "-" + suffix
              group_name="${dir_cleaned#_}-${suffix}"

              echo "  Processing: $file_cleaned (group: $group_name)"

              # Run uv export command
              uv export --format requirements.txt --group "$group_name" --output-file "$file_cleaned" --no-hashes
          done

      - name: Commit and push requirements files if changed
        env:
          BOT_USER: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          BOT_EMAIL: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
        run: |
          # Configure git username & email
          git config user.name "${BOT_USER}"
          git config user.email "${BOT_EMAIL}"

          # Exit if there are no changes to commit
          if git diff --quiet --exit-code; then
            echo "No updates to requirements files detected, no changes to commit."
            exit 0
          else
            echo "Requirements files update detected, preparing to commit."
            git commit -am "fix: update requirements files [skip ci]"
          fi
          git push

  append-pr-note:
    name: Append pyproject.toml note to dependabot PR
    permissions:
      contents: read
      pull-requests: write # Needed to edit the dependabot PR body
    runs-on: ubuntu-latest
    steps:
      - name: "Append warning note to the dependabot PR body"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Resolve the PR number associated with the pushed dependabot branch.
          PR_NUMBER="$(gh pr list --head "${BRANCH}" --state open --json number -q '.[0].number' || true)"
          if [ -z "${PR_NUMBER}" ]; then
            echo "::warning::No open PR found for branch '${BRANCH}' yet; skipping PR body update."
            exit 0
          fi
          echo "Found PR #${PR_NUMBER} for branch '${BRANCH}'."

          # Hidden marker to prevent duplicate appends.
          MARKER="<!-- ansys-actions:pyproject-note -->"

          # Fetch the current PR body.
          CURRENT_BODY="$(gh pr view "${PR_NUMBER}" --json body -q .body)"

          if printf '%s' "${CURRENT_BODY}" | grep -qF "${MARKER}"; then
            echo "Marker already present in PR #${PR_NUMBER} body; nothing to do."
            exit 0
          fi

          # Build the new body: existing body + blank line + marked note block.
          NEW_BODY_FILE="$(mktemp)"
          {
            printf '%s\n\n' "${CURRENT_BODY}"
            printf '%s\n' "${MARKER}"
            cat <<'EOF'
          > [!WARNING]
          > If this dependabot update includes any changes to the `pyproject.toml`, ensure the version specifiers in the `pyproject.toml` are reverted to a valid `major.minor` range by taking the following steps:
          >   - Clone the branch locally.
          >   - Update the pinned versions in the `pyproject.toml` as needed. For example, say dependabot proposes a change from "wcwidth<=0.7" to "wcwidth<=0.8.1", this must be updated to "wcwidth<=0.9". Another example is a change from "safety>=3.7,<4" to "safety>=3.8.0,<4", this must be updated to "safety>=3.8,<4". No changes should be made to the `requirement.txt` files.
          >   - Run `uv lock` to update the lock file.
          >   - Commit your changes to the PR and proceed to merge.
          EOF
            printf '%s\n' "<!-- /ansys-actions:pyproject-note -->"
          } > "${NEW_BODY_FILE}"

          # Update the PR body using --body-file to avoid shell escaping issues
          # with backticks, angle brackets, and quoted version specifiers.
          gh pr edit "${PR_NUMBER}" --body-file "${NEW_BODY_FILE}"
          echo "Appended pyproject.toml warning note to PR #${PR_NUMBER}."
