doc-deploy-custom-path:
  name: "Deploy documentation to a custom path"
  runs-on: ubuntu-latest
  needs: doc-build
  permissions:
    contents: write  # Required to push documentation to the gh-pages branch
  steps:
    - name: "Deploy the documentation to a custom subdirectory"
      uses: ansys/actions/doc-deploy-custom-path@{{ version }}
      with:
          cname: "<library>.docs.pyansys.com"
          token: ${{ '{{ secrets.GITHUB_TOKEN }}' }}
          bot-user: ${{ '{{ secrets.PYANSYS_CI_BOT_USERNAME }}' }}
          bot-email: ${{ '{{ secrets.PYANSYS_CI_BOT_EMAIL }}' }}
          custom-path: "nightly"
