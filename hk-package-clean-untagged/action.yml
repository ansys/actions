name: "Clean untagged package versions."
description: |
  Action cleaning up untagged package versions published at ghcr.io.

  .. important:: **Required GitHub Permissions**

     - **packages**: ``delete`` - Required to delete package versions from GitHub Container Registry (GHCR)

inputs:
  package-name:
    description: "Package name."
    required: true
    type: string
  token:
    description: "Token with package deletion permissions."
    required: true
    type: string
  package-org:
    description: "Organization where packages are published."
    required: false
    default: 'ansys'
    type: string
  allow-last-days:
    description: "Avoid removing the last N days images: e.g. '2'."
    required: false
    default: ''
    type: string

runs:
  using: "composite"
  steps:

    - name: "Set up Python 3.14"
      uses: ansys/actions/_setup-python@main
      with:
        python-version: '3.14'
        use-cache: false
        provision-uv: true
        prune-uv-cache: true

    - name: "Install required packages"
      shell: bash
      run: |
        uv pip install --no-managed-python --system --upgrade pip
        uv pip install --no-managed-python --system --no-deps -r ${GITHUB_ACTION_PATH}/requirements.txt

    - name: "Run package cleanup"
      shell: bash
      env:
        ALLOW_LAST_DAYS: ${{ inputs.allow-last-days }}
        PACKAGE_ORG: ${{ inputs.package-org }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        PACKAGE_DELETION_TOKEN: ${{ inputs.token }}
      run: |
        python ${GITHUB_ACTION_PATH}/../python-utils/hk_package_clean_untagged.py

