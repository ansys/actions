name: |
  Release devpi action

description: |
  Test-release library artifacts to a local devpi server. Artifacts are
  downloaded from the CI/CD pipeline and are assumed to be named
  ``<library-name>-artifacts``. The action starts a local devpi server via
  Docker Compose, uploads the artifacts, and verifies the package is
  installable from the local index.

inputs:

  library-name:
    description: |
      Name of the Python library whose artifacts are to be test-published.
    required: true
    type: string

runs:
  using: "composite"
  steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: "Start devpi server"
      shell: bash
      run: docker compose -f .ci/devpi/docker-compose.yml up -d --build

    - name: "Wait for devpi server to be ready"
      shell: bash
      run: timeout 120 bash -c 'until curl -sf http://localhost:3141/; do sleep 2; done'

    - name: "Download distribution artifacts"
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.library-name }}-artifacts
        path: dist

    - name: "Upload artifacts to devpi"
      shell: bash
      env:
        TWINE_USERNAME: root
        TWINE_PASSWORD: devpipass
        TWINE_REPOSITORY_URL: http://localhost:3141/root/public/
      run: | # zizmor: ignore[use-trusted-publishing]
        pip install -U twine packaging
        twine upload dist/*

    - name: "Verify package is installable from devpi"
      shell: bash
      env:
        LIBRARY: ${{ inputs.library-name }}
      run: pip install --index-url http://localhost:3141/root/public/+simple/ --no-deps "${LIBRARY}"
