# This project file exists solely for two reasons: managing the python package dependencies for each action; and
# specifying the towncrier configuration

[project]
name = "ansys-actions-ci-dependencies"
version = "10.4.dev0"
requires-python = ">=3.10"

[dependency-groups]
build-library = [
    "build",
    "twine",
]
build-wheelhouse = [
    "build",
    "wheel",
]
check-licenses = [
    "pip-licenses",
    "prettytable",
    "wcwidth",
]
check-vulnerabilities = [
    "bandit>=1.9.4,<2",
    "click>=8.3.3,<9",
    "pygithub>=2.9.1,<3",
    "safety>=3.7.0,<4",
]
code-style = [
    "pre-commit",
    "prek",
]
doc-changelog = [
    "tomlkit",
    "towncrier",
]
doc-deploy-changelog = [
    "tomlkit",
    "towncrier",
]
doc-deploy-stable = [
    "packaging",
]
doc-style = [
    "docutils",
    "tomlkit",
]
hk-package-clean-except = [
    "fastcore",
    "ghapi",
    "packaging",
]
hk-package-clean-untagged = [
    "fastcore",
    "ghapi",
    "packaging",
]
release-github = [
    "pypandoc-binary",
    "tomlkit",
]
release-pypi = [
    "twine",
]
tests-pytest = [
    "pytest-randomly",
]

[tool.towncrier]
package = "ansys.actions.core"
package_dir  = ".ci/ansys-actions/src"
directory = "doc/source/changelog"
filename = "doc/source/changelog.rst"
template = "doc/source/changelog/template"
start_string = ".. towncrier release notes start\n"
title_format = "`{version} <https://github.com/ansys/actions/releases/tag/v{version}>`_ - {project_date}"
issue_format = "`#{issue} <https://github.com/ansys/actions/pull/{issue}>`_"

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking"
showcontent = true

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "documentation"
name = "Documentation"
showcontent = true

[[tool.towncrier.type]]
directory = "dependencies"
name = "Dependencies"
showcontent = true

[[tool.towncrier.type]]
directory = "maintenance"
name = "Maintenance"
showcontent = true

[[tool.towncrier.type]]
directory = "miscellaneous"
name = "Miscellaneous"
showcontent = true

[[tool.towncrier.type]]
directory = "test"
name = "Test"
showcontent = true
